<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniClub – Profile Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,600;0,700;0,800;0,900;1,800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body onload="guardStudentPage('profile', 'initProfile')">
<div id="page-profile" class="page-container" style="background:var(--cream-bg);">
  <div class="container" style="max-width:900px; margin: 0 auto; padding: 24px;">
    <div class="profile-header" style="margin-bottom: 32px">
      <div class="label mb-4" style="margin-bottom:6px; font-weight:700">My Account</div>
      <div class="display-lg" style="font-size:3rem">Dashboard</div>
    </div>

    <!-- Profile Card -->
    <div class="dash-card" style="padding: 40px; margin-bottom:40px;">
      <div style="position:relative; display:inline-block; margin-bottom:24px;">
        <div class="dash-avatar" id="profile-avatar" style="margin-bottom:0; width:90px; height:90px; font-size:2.2rem;">AK</div>
        <button class="dash-action-btn" onclick="openEditProfile()" title="Edit Profile" style="bottom:-4px; right:-4px; top:auto; width:40px; height:40px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
        </button>
      </div>
      <div class="dash-name" id="display-name">Loading…</div>
      <div class="dash-role" id="display-role">Loading…</div>
      <div style="margin-top: 32px; border-top: 2px solid var(--border); padding-top: 24px; display: flex; align-items: center; justify-content: space-between;">
        <div class="dash-section-title" style="margin-bottom:0; color:var(--black);">Personality Match Quiz</div>
        <button class="dash-pill" style="cursor:pointer; background:var(--black); color:white; border-radius:100px; font-size:1rem; padding:10px 24px;" onclick="window.location.href='quest.html'">Retake Quiz ↗</button>
      </div>
    </div>

    <!-- Clubs Grid -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 32px;">
      <!-- Enrolled Clubs -->
      <div>
        <div class="dash-section-title" style="margin-bottom:16px; color:var(--black);">Enrolled Clubs</div>
        <div class="stack-container" id="dashboard-enrolled-list">
          <div style="padding:20px;color:var(--gray);font-size:0.85rem">Loading…</div>
        </div>
      </div>

      <!-- Pending Requests -->
      <div>
        <div class="dash-section-title" style="margin-bottom:16px; color:var(--black);">My Requests</div>
        <div class="stack-container" id="dashboard-requests-list">
          <div style="padding:20px;color:var(--gray);font-size:0.85rem">Loading…</div>
        </div>
      </div>
    </div>

    <!-- Account Actions -->
    <div style="margin-top:40px; padding:24px; border:2px solid var(--black); border-radius:24px; background:white; display:flex; justify-content:space-between; align-items:center; box-shadow: 4px 4px 0 var(--black);">
      <div class="dash-name" style="font-size:1.6rem; margin-bottom:0">Account</div>
      <div style="display:flex; gap:16px; align-items:center;">
        <button class="dash-pill" style="border-radius:100px; background:white; color:var(--red); font-weight:700; border:2px solid var(--black); box-shadow:2px 2px 0 var(--black);" onclick="showThemedModal({title:'Account deletion requested.', message:'Your request for account deletion has been sent to the administrator.', confirmText:'Close', hideCancel:true, onConfirm:()=>closeThemedModal()})">Delete Account</button>
        <button class="dash-pill" onclick="handleLogout()" style="border-radius:100px; background:var(--black); font-weight:700; color:white; border:2px solid var(--black); box-shadow:2px 2px 0 var(--black);">Log Out</button>
      </div>
    </div>
    <div style="height:120px"></div>
  </div>
</div>

<!-- EDIT PROFILE MODAL -->
<div id="edit-profile-modal" class="modal-overlay" style="display:none; align-items:center; justify-content:center; z-index:9999; background:rgba(17,17,17,0.92); backdrop-filter:blur(4px);">
  <div class="modal-content dash-card" style="width:100%; max-width:480px; padding:40px; background:#FDF6EE; animation:slideUp 0.3s ease; border:2px solid var(--black);">
    <button class="dash-action-btn" onclick="closeEditProfile()" style="position:absolute; top:24px; right:24px; box-shadow:none; border-width:2px;" title="Close">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
    <div class="dash-name" style="font-size:2.2rem; margin-bottom:24px; color:var(--black);">Edit Profile</div>
    <div style="margin-bottom:16px;">
      <label class="dash-section-title" style="display:block; margin-bottom:8px; color:var(--black);">Full Name</label>
      <input type="text" id="edit-name" class="comment-input" style="width:100%; height:48px; border:2px solid var(--black); background:white; color:var(--black);">
    </div>
    <div style="margin-bottom:32px;">
      <label class="dash-section-title" style="display:block; margin-bottom:8px; color:var(--black);">Department · Year</label>
      <input type="text" id="edit-dept" class="comment-input" style="width:100%; height:48px; border:2px solid var(--black); background:white; color:var(--black);">
    </div>

    <!-- Manage Enrolled Clubs -->
    <div style="margin-bottom:12px; display:flex; justify-content:space-between; align-items:center;">
      <label class="dash-section-title" style="color:var(--black); margin-bottom:0">Manage Enrolled Clubs</label>
    </div>
    <div style="margin-bottom:32px; margin-top:12px;">
      <div id="edit-clubs-list" style="display:flex; flex-direction:column; gap:10px;">
        <div style="padding:10px;color:var(--gray);font-size:0.85rem">Loading…</div>
      </div>
    </div>

    <button class="dash-pill" style="width:100%; justify-content:center; border-radius:100px; height:54px; font-size:1.1rem; font-weight:700; border:2px solid var(--black); background:var(--black); color:white; box-shadow:4px 4px 0 var(--black);" onclick="saveProfileChanges()">Save Changes</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/data.js"></script>
<script src="../js/components.js"></script>
<script src="../js/app.js"></script>
<script>
let currentProfile = null;
let currentMemberships = [];

async function initProfile() {
  try {
    currentProfile = await UniClubAPI.getMyProfile();
    currentMemberships = await UniClubAPI.getMyMemberships();
    const requests = await UniClubAPI.getMyRequests();

    // Update display
    const initials = UniClubAPI.getInitials(currentProfile.full_name);
    document.getElementById('profile-avatar').textContent = initials;
    document.getElementById('display-name').textContent = currentProfile.full_name;
    document.getElementById('display-role').textContent = `${currentProfile.department || 'Undecided'} · ${currentProfile.year ? ordinal(currentProfile.year) + ' Year' : 'Student'}`;

    // Enrolled clubs
    const enrolledList = document.getElementById('dashboard-enrolled-list');
    if (currentMemberships.length > 0) {
      enrolledList.innerHTML = currentMemberships.map(m => `
        <div class="stack-card">
          <div>
            <div style="font-weight:800; font-family:var(--font-head); font-size:1.2rem; color:var(--black);">${m.clubs.name}</div>
            <div class="club-role-subtitle">${m.role}</div>
          </div>
        </div>
      `).join('');
    } else {
      enrolledList.innerHTML = '<div style="padding:20px;color:var(--gray);font-size:0.85rem">No clubs yet. Explore and join some!</div>';
    }

    // Requests
    const requestsList = document.getElementById('dashboard-requests-list');
    if (requests.length > 0) {
      requestsList.innerHTML = requests.slice(0, 10).map(r => {
        const statusDot = { pending: '#f59e0b', approved: '#10b981', rejected: '#ef4444' };
        const statusLabel = { pending: 'Pending', approved: 'Approved', rejected: 'Rejected' };
        const dotColor = statusDot[r.status] || '#ccc';
        const isPending = r.status === 'pending';
        return `
          <div class="stack-card" style="border-left:4px solid ${dotColor}">
            <div style="flex:1">
              <div style="font-weight:800; font-family:var(--font-head); font-size:1rem; color:var(--black);">${r.type === 'leave' ? 'Leave' : 'Join'}: ${r.clubs?.name || 'Club'}</div>
              <div style="display:flex;align-items:center;gap:6px;margin-top:4px;">
                <span style="width:8px;height:8px;border-radius:50%;background:${dotColor};display:inline-block;"></span>
                <span style="font-size:0.8rem;font-weight:600;color:${dotColor};font-family:var(--font-body);">${statusLabel[r.status] || r.status}</span>
              </div>
            </div>
            ${isPending ? `<button onclick="revokeRequest('${r.id}')" class="dash-pill" style="padding:6px 16px;font-size:0.75rem;border-radius:100px;background:white;color:#dc2626;border:2px solid #dc2626;font-weight:700;cursor:pointer;white-space:nowrap;">Revoke</button>` : ''}
          </div>
        `;
      }).join('');
    } else {
      requestsList.innerHTML = '<div style="padding:20px;color:var(--gray);font-size:0.85rem">No requests yet.</div>';
    }
  } catch (e) {
    console.error('Profile init error:', e);
  }
}

function ordinal(n) { return n === 1 ? '1st' : n === 2 ? '2nd' : n === 3 ? '3rd' : n + 'th'; }

function openEditProfile() {
  document.getElementById('edit-name').value = currentProfile.full_name;
  document.getElementById('edit-dept').value = `${currentProfile.department || ''} · ${currentProfile.year || ''}`;

  // Populate clubs
  const editList = document.getElementById('edit-clubs-list');
  editList.innerHTML = currentMemberships.map(m => `
    <div class="dash-card" data-club-id="${m.club_id}" style="padding:12px 16px; border-radius:12px; border:2px solid var(--black); box-shadow:2px 2px 0 var(--black); display:flex; justify-content:space-between; align-items:center;">
      <div>
        <div style="font-weight:700; font-family:var(--font-head); font-size:1.05rem; color:var(--black);">${m.clubs.name}</div>
        <div class="club-role-subtitle">${m.role}</div>
      </div>
      <button class="dash-action-btn" onclick="event.stopPropagation(); requestLeaveFromProfile('${m.club_id}', '${m.clubs.name}')" style="background:white; color:#dc2626; border:2px solid var(--black); box-shadow:2px 2px 0 var(--black); position:static; width:32px; height:32px;" title="Request Leave">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
  `).join('') || '<div style="padding:10px;color:var(--gray)">No enrolled clubs.</div>';

  document.getElementById('edit-profile-modal').style.display = 'flex';
}

function closeEditProfile() {
  document.getElementById('edit-profile-modal').style.display = 'none';
}

async function saveProfileChanges() {
  const newName = document.getElementById('edit-name').value.trim();
  if (!newName) return;

  try {
    const user = await UniClubAPI.getUser();
    await UniClubAPI.updateProfile(user.id, { full_name: newName });
    currentProfile.full_name = newName;
    document.getElementById('display-name').textContent = newName;
    document.getElementById('profile-avatar').textContent = UniClubAPI.getInitials(newName);
    closeEditProfile();
  } catch (e) {
    showThemedModal({ title: 'Error', message: 'Failed to save: ' + e.message, confirmText: 'OK', hideCancel: true, onConfirm: () => {} });
  }
}

async function requestLeaveFromProfile(clubId, clubName) {
  // Check for existing pending leave request first
  const alreadyPending = await UniClubAPI.hasPendingRequest(clubId, 'leave');
  if (alreadyPending) {
    showThemedModal({
      title: 'Already Requested',
      message: `Your leave request for ${clubName} is still pending. Please wait for the faculty to respond.`,
      confirmText: 'Got it',
      hideCancel: true,
      onConfirm: () => {}
    });
    return;
  }
  showThemedModal({
    title: `Leave ${clubName}?`,
    message: 'This will send a leave request to the faculty coordinator.',
    confirmText: 'Send Request',
    onConfirm: async () => {
      try {
        await UniClubAPI.requestLeave(clubId, 'I need to step back from this club.');
        await initProfile(); // Refresh
        closeEditProfile();
      } catch (e) {
        showThemedModal({ title: 'Error', message: 'Failed: ' + e.message, confirmText: 'OK', hideCancel: true, onConfirm: () => {} });
      }
    }
  });
}

async function revokeRequest(requestId) {
  showThemedModal({
    title: 'Revoke Request?',
    message: 'This will cancel your pending request.',
    confirmText: 'Yes, Revoke',
    onConfirm: async () => {
      try {
        await UniClubAPI.cancelRequest(requestId);
        await initProfile();
      } catch (e) {
        showThemedModal({ title: 'Error', message: 'Failed to revoke: ' + e.message, confirmText: 'OK', hideCancel: true, onConfirm: () => {} });
      }
    }
  });
}

async function handleLogout() {
  await UniClubAPI.signOut();
  window.location.href = '../auth.html?mode=signin';
}
</script>
</body>
</html>
