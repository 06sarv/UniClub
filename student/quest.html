<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniClub – Questionnaire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,600;0,700;0,800;0,900;1,800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script>
  (async function guardQuest() {
    const session = await UniClubAPI.getSession();
    if (!session) { window.location.href = '../auth.html?mode=signin'; return; }
    const profile = await UniClubAPI.getMyProfile();
    if (profile.role !== 'student') { window.location.href = '../faculty/home.html'; }
  })();
</script>
<div id="page-quest" class="page-container" style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:#2b2b2b; padding:32px;">
  <div class="quiz-container" style="width:100%; max-width: 980px; min-height:520px; display:flex; position:relative;">
    <button class="dash-action-btn" onclick="window.location.href='home.html'" style="position:absolute; top:18px; right:18px; z-index:10000; width:36px; height:36px; border-radius:50%;" title="Skip Quiz">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>

    <div id="quiz-step-1" class="quiz-step" style="width:100%; display:flex;">
      <div style="flex:1; background:var(--cream); padding:64px; display:flex; flex-direction:column; justify-content:center; border-right:2px solid var(--border);">
        <div style="font-family: var(--font-head); font-weight: 800; font-size: 3rem; letter-spacing:-0.03em; line-height:1.1; margin-bottom:24px; color:var(--black);">Now, pick your<br>interests</div>
        <div style="display:flex; gap:8px; margin-top:auto;">
          <div class="quiz-dot active"></div><div class="quiz-dot"></div><div class="quiz-dot"></div>
        </div>
      </div>
      <div style="flex:1; padding:40px; display:flex; flex-direction:column; background:white; gap:20px;">
        <div class="quiz-pill-network" id="interest-pills" style="justify-content:flex-start; flex:1; overflow-y:auto; align-content:flex-start;"></div>
        <button class="btn btn-primary" style="flex-shrink:0; height:52px; border-radius:100px; font-size:1.05rem; border-color:black; background:black; color:white;" onclick="nextQuizStep(1)">Next step →</button>
      </div>
    </div>

    <div id="quiz-step-2" class="quiz-step" style="width:100%; display:none;">
      <div style="flex:1; background:var(--cream); padding:64px; display:flex; flex-direction:column; justify-content:center; border-right:2px solid var(--border);">
        <div style="font-family: var(--font-head); font-weight: 800; font-size: 3rem; letter-spacing:-0.03em; line-height:1.1; margin-bottom:24px; color:var(--black);">Desired<br>commitment level?</div>
        <div style="display:flex; gap:8px; margin-top:auto;">
          <div class="quiz-dot"></div><div class="quiz-dot active"></div><div class="quiz-dot"></div>
        </div>
      </div>
      <div style="flex:1; padding:64px; display:flex; flex-direction:column; background:white; justify-content:center;">
        <div class="quiz-pill-network" id="commitment-pills" style="justify-content:flex-start;"></div>
        <button class="btn btn-primary" style="margin-top:auto; height:56px; border-radius:100px; font-size:1.1rem; border-color:black; background:black; color:white;" onclick="nextQuizStep(2)">Next step →</button>
      </div>
    </div>

    <div id="quiz-step-3" class="quiz-step" style="width:100%; display:none;">
      <div style="flex:1; background:var(--cream); padding:64px; display:flex; flex-direction:column; justify-content:center; border-right:2px solid var(--border);">
        <div style="font-family: var(--font-head); font-weight: 800; font-size: 3rem; letter-spacing:-0.03em; line-height:1.1; margin-bottom:24px; color:var(--black);">What's your<br>primary focus?</div>
        <div style="display:flex; gap:8px; margin-top:auto;">
          <div class="quiz-dot"></div><div class="quiz-dot"></div><div class="quiz-dot active"></div>
        </div>
      </div>
      <div style="flex:1; padding:64px; display:flex; flex-direction:column; background:white; justify-content:center;">
        <div class="quiz-pill-network" id="focus-pills" style="justify-content:flex-start;"></div>
        <button class="btn btn-primary" style="margin-top:auto; height:56px; border-radius:100px; font-size:1.1rem; border-color:black; background:var(--blue); color:white;" onclick="submitQuiz()">Find Matches! →</button>
      </div>
    </div>
  </div>
</div>
<script>
// Interest tags that match club tags in the database
const interests = ['AI', 'Machine Learning', 'Code', 'Design', 'Music', 'Photography', 'Robotics', 'Security', 'Data', 'Sports', 'Debate', 'Environment', 'Finance', 'Writing', 'Games', 'Startup', 'Social', 'Fitness', 'Travel', 'Cooking'];
const commitmentOptions = [
  { label: 'Light (1-2 hrs)', value: 'light' },
  { label: 'Medium (3-5 hrs)', value: 'medium' },
  { label: 'Heavy (5+ hrs)', value: 'heavy' },
];
const focusOptions = ['Networking', 'Skill Building', 'Competitions', 'Social', 'Research', 'Community'];

function createPill(container, text, isToggle = true) {
  const div = document.createElement('div');
  div.className = 'quiz-pill';
  div.dataset.value = text;
  div.innerHTML = `${text} <span class="plus">+</span>`;
  if (isToggle) {
    div.onclick = function() {
      this.classList.toggle('selected');
      const span = this.querySelector('.plus');
      span.innerHTML = this.classList.contains('selected')
        ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>'
        : '+';
    };
  }
  container.appendChild(div);
}

// Build Step 1: Interests
const interestContainer = document.getElementById('interest-pills');
interests.forEach(i => createPill(interestContainer, i));

// Build Step 2: Commitment
const commitContainer = document.getElementById('commitment-pills');
commitmentOptions.forEach(opt => {
  const div = document.createElement('div');
  div.className = 'quiz-pill';
  div.dataset.value = opt.value;
  div.innerHTML = `${opt.label} <span class="plus">+</span>`;
  div.onclick = function() {
    // Single select
    commitContainer.querySelectorAll('.quiz-pill').forEach(p => {
      p.classList.remove('selected');
      p.querySelector('.plus').innerHTML = '+';
    });
    this.classList.add('selected');
    this.querySelector('.plus').innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>';
  };
  commitContainer.appendChild(div);
});

// Build Step 3: Focus
const focusContainer = document.getElementById('focus-pills');
focusOptions.forEach(f => createPill(focusContainer, f));

function nextQuizStep(current) {
  document.getElementById(`quiz-step-${current}`).style.display = 'none';
  document.getElementById(`quiz-step-${current + 1}`).style.display = 'flex';
}

async function submitQuiz() {
  // Gather selected interests using data-value attributes
  const selectedInterests = [];
  interestContainer.querySelectorAll('.quiz-pill.selected').forEach(p => {
    selectedInterests.push(p.dataset.value);
  });

  // Gather commitment
  const selectedCommitment = commitContainer.querySelector('.quiz-pill.selected');
  const commitment = selectedCommitment ? selectedCommitment.dataset.value : 'medium';

  // Gather focus using data-value attributes
  const selectedFocus = [];
  focusContainer.querySelectorAll('.quiz-pill.selected').forEach(p => {
    selectedFocus.push(p.dataset.value);
  });

  try {
    await UniClubAPI.saveQuizAnswers(selectedInterests, commitment, selectedFocus);
    window.location.href = 'explore.html?recommended=true';
  } catch (e) {
    console.error('Failed to save quiz:', e);
    window.location.href = 'explore.html?recommended=true';
  }
}
</script>
</body>
</html>
