<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniClub – Compare</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,600;0,700;0,800;0,900;1,800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body onload="guardStudentPage('compare','initCompare')">
<!-- ===================== COMPARE PAGE ===================== -->
<div id="page-compare" class="page-container">
  <div class="container">
    <div class="compare-header">
      <div class="label mb-4" style="margin-bottom:6px">Club Comparison</div>
      <div class="display-lg">Compare Clubs</div>
      <p class="body-text mt-4" style="margin-top:8px">Select up to 3 clubs to compare side by side.</p>
    </div>

    <div class="compare-table" id="compareTable"></div>
  </div>
</div>

<div class="compare-picker-overlay" id="comparePicker" onclick="closeComparePickerOutside(event)">
  <div class="compare-picker-card">
    <div class="compare-picker-head">
      <div>
        <div class="label">Pick a club</div>
        <div class="display-md" style="margin-top:4px">Add to Compare</div>
      </div>
      <button class="compare-picker-close" onclick="closeComparePicker()">✕</button>
    </div>
    <div class="compare-picker-list" id="comparePickerList"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/data.js"></script>
<script src="../js/components.js"></script>
<script src="../js/app.js"></script>
</body>
</html>
